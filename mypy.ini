[mypy]
ignore_missing_imports = True

# mypy 1.16.1 crashes with an INTERNAL ERROR when scanning langsmith's
# vendored OpenAPI client (_openapi_client/_client.py).
# Skipping follow-imports on all third-party packages we don't own.
[mypy-langsmith.*]
ignore_errors = True
follow_imports = skip

[mypy-langchain.*]
ignore_errors = True
follow_imports = skip

[mypy-langchain_google_genai.*]
ignore_errors = True
follow_imports = skip

[mypy-celery.*]
ignore_errors = True
follow_imports = skip

[mypy-redis.*]
ignore_errors = True
follow_imports = skip
