name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint · Type-check · Security · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: darkatlas
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: darkatlas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://darkatlas:ci_password@localhost:5432/darkatlas_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key-ci' }}
      TENANT_ISOLATION: row
      APP_ENV: development
      DOCS_ENABLED: "true"
      # JWT keys generated fresh in conftest.py for tests
      JWT_PRIVATE_KEY_B64: placeholder
      JWT_PUBLIC_KEY_B64: placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (pyrefly)
        run: pyrefly check

      - name: Security scan (bandit)
        run: bandit -r app/ -ll  # fail on HIGH severity
        continue-on-error: false

      - name: Dependency CVE scan (pip-audit)
        run: pip-audit --desc on
        continue-on-error: false

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
